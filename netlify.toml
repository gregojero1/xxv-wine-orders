[build]
  base    = "frontend"
  command = "npm run build"
  publish = "../dist"

[build.environment]
  NODE_VERSION = "20"

# SPA : renvoyer index.html pour toutes les routes (y compris /admin)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# En-têtes sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
